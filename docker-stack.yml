version: '3.9'

networks:
  telestore:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  telegram_bot_api_data:
    driver: local

services:
  postgres:
    image: postgres:17-alpine
    networks:
      - telestore
    ports:
      - target: 5432
        published: 5433
        protocol: tcp

    environment:
      POSTGRES_DB: telestore
      POSTGRES_USER: telestore
      POSTGRES_PASSWORD: telestore_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U telestore']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.telestore.db == true
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        order: stop-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        failure_action: pause

  redis:
    image: redis:7-alpine
    networks:
      - telestore
    ports:
      - target: 6379
        published: 6379
        protocol: tcp

    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.telestore.redis == true
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        order: stop-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        failure_action: pause

  backend:
    image: ${REGISTRY:-localhost}/telestore-backend:${TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    networks:
      - telestore
    ports:
      - target: 8000
        published: 8000
        protocol: tcp

    environment:
      APP_NAME: TeleStore
      APP_ENV: production
      APP_DEBUG: 'false'
      APP_KEY: ${APP_KEY:-base64:0qUiENuALUIfrxw22Aor1fX7+zk5bop23/ret7Y2PDA=}
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:7888
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: telestore
      DB_USERNAME: telestore
      DB_PASSWORD: telestore_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      SANCTUM_STATEFUL_DOMAINS: localhost:7888,localhost
      CORS_ALLOWED_ORIGINS: http://localhost:7888
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-lucidfordream_bot}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-8833059580:AAHCvXR-umWt2eAuA7BeoYBdMM6S51uVAqg}
      TELEGRAM_LOCAL_API_URL: ${TELEGRAM_LOCAL_API_URL:-}
      SERVER_NAME: :8000
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/up.php']
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      - postgres
      - redis
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.telestore.backend == true
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 60s
        max_failure_ratio: 0.3
      rollback_config:
        parallelism: 1
        failure_action: pause
        monitor: 60s

  queue-worker:
    image: ${REGISTRY:-localhost}/telestore-backend:${TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    networks:
      - telestore
    command: php artisan queue:work --queue=uploads,webhooks,default --sleep=3 --tries=3 --timeout=1200
    environment:
      APP_NAME: TeleStore
      APP_ENV: production
      APP_DEBUG: 'false'
      APP_KEY: ${APP_KEY:-base64:0qUiENuALUIfrxw22Aor1fX7+zk5bop23/ret7Y2PDA=}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: telestore
      DB_USERNAME: telestore
      DB_PASSWORD: telestore_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-lucidfordream_bot}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-8833059580:AAHCvXR-umWt2eAuA7BeoYBdMM6S51uVAqg}
      TELEGRAM_LOCAL_API_URL: ${TELEGRAM_LOCAL_API_URL:-}
    stop_grace_period: 30m
    healthcheck:
      disable: true
    depends_on:
      - backend
      - redis
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.telestore.queue == true
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      restart_policy:
        condition: any
        delay: 15s
        max_attempts: 5
        window: 180s
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
        monitor: 120s
        max_failure_ratio: 0.5
      rollback_config:
        parallelism: 1
        failure_action: pause
        monitor: 120s

  frontend:
    image: ${REGISTRY:-localhost}/telestore-frontend:${TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - telestore
    ports:
      - target: 5173
        published: 7888
        protocol: tcp

    environment:
      VITE_API_URL: ""
    depends_on:
      - backend
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.telestore.frontend == true
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 60s
        max_failure_ratio: 0.3
      rollback_config:
        parallelism: 1
        failure_action: pause
        monitor: 60s

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    networks:
      - telestore
    ports:
      - target: 8081
        published: 8081
        protocol: tcp
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_LOCAL: 1
    volumes:
      - telegram_bot_api_data:/var/lib/telegram-bot-api
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.telestore.backend == true
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
