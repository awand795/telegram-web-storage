services:
  postgres:
    image: postgres:17-alpine
    container_name: telestore-db
    environment:
      POSTGRES_DB: telestore
      POSTGRES_USER: telestore
      POSTGRES_PASSWORD: telestore_secret
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U telestore']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: telestore-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: build
    container_name: telestore-api
    ports:
      - '8000:8000'
    environment:
      APP_NAME: TeleStore
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_KEY: ${APP_KEY:-base64:random32charsplaceholder}
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:7888
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: telestore
      DB_USERNAME: telestore
      DB_PASSWORD: telestore_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      SANCTUM_STATEFUL_DOMAINS: localhost:7888,localhost
      CORS_ALLOWED_ORIGINS: http://localhost:7888
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_LOCAL_API_URL: ${TELEGRAM_LOCAL_API_URL:-}
    volumes:
      - ./backend:/var/www
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      telegram-bot-api:
        condition: service_started
    # Graceful shutdown: 30s for ongoing requests to finish
    stop_grace_period: 30s
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/up.php']
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: build
    container_name: telestore-queue
    command: php artisan queue:work --queue=uploads,webhooks,default --sleep=3 --tries=3 --timeout=1200
    environment:
      APP_NAME: TeleStore
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_KEY: ${APP_KEY:-base64:random32charsplaceholder}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: telestore
      DB_USERNAME: telestore
      DB_PASSWORD: telestore_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_LOCAL_API_URL: ${TELEGRAM_LOCAL_API_URL:-}
    volumes:
      - ./backend:/var/www
    depends_on:
      - backend
      - redis
    # Graceful shutdown: 30 menit untuk menyelesaikan upload file yang sedang berjalan
    stop_grace_period: 30m
    healthcheck:
      test: ["NONE"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: telestore-web
    ports:
      - '7888:5173'
    environment:
      VITE_API_URL: ''
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telestore-tg-api
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: 1
    volumes:
      - telegram_bot_api_data:/var/lib/telegram-bot-api
    ports:
      - '8081:8081'
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  telegram_bot_api_data:
